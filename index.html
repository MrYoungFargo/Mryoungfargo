<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>MrYoungFargo Merch | Official Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0a0f1a 0%, #1a0a2e 50%, #2a0a4e 100%);
      color: #f0f0f0;
      line-height: 1.5;
      min-height: 100vh;
    }

    :root {
      --black: #000000;
      --red: #e11d2c;
      --green: #10b981;
      --blue: #3b82f6;
      --purple: #7f2aeb;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* Full header with gradient background - NO BOX around logo */
    .site-header {
      background: linear-gradient(135deg, #000000, #0a2a5a, #000000, #0a2a5a);
      background-size: 300% 300%;
      border-bottom: 1px solid rgba(127,42,235,0.3);
      animation: headerGradient 4s ease infinite;
    }
    @keyframes headerGradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      padding: 20px 0;
      gap: 20px;
    }

    .logo {
      flex: 1;
      text-align: center;
    }
    .logo img {
      max-height: 180px;
      width: auto;
      animation: spin3D 10s ease-in-out infinite;
      transform-style: preserve-3d;
      perspective: 1000px;
    }
    @keyframes spin3D {
      0% { transform: rotateY(0deg); }
      50% { transform: rotateY(180deg); }
      100% { transform: rotateY(360deg); }
    }

    /* Sticky nav bar */
    .sticky-nav {
      position: fixed;
      top: -100px;
      left: 0;
      width: 100%;
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(127,42,235,0.4);
      padding: 12px 20px;
      z-index: 1000;
      transition: top 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 40px;
    }
    .sticky-nav.show {
      top: 0;
    }
    .sticky-nav a {
      color: #ddd;
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .sticky-nav a:hover { color: var(--purple); }
    .sticky-cart {
      position: relative;
      cursor: pointer;
      font-size: 1.3rem;
      color: white;
      margin-left: auto;
    }
    .sticky-cart .cart-count-sticky {
      position: absolute;
      top: -8px;
      right: -12px;
      background: var(--red);
      color: white;
      font-size: 0.7rem;
      border-radius: 30px;
      padding: 2px 6px;
    }
    .sticky-nav-links {
      display: flex;
      gap: 40px;
      align-items: center;
    }

    .nav-links {
      display: flex;
      gap: 32px;
    }
    .nav-links a {
      color: #ddd;
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .nav-links a:hover { color: var(--purple); }

    .cart-icon {
      position: relative;
      cursor: pointer;
      font-size: 1.4rem;
    }
    .cart-count {
      position: absolute;
      top: -8px;
      right: -12px;
      background: var(--red);
      color: white;
      font-size: 0.7rem;
      border-radius: 30px;
      padding: 2px 6px;
    }

    .hero {
      padding: 40px 0;
      text-align: center;
    }
    .hero h2 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #fff, var(--purple));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .hero p {
      color: #aaa;
      margin-top: 10px;
      font-size: 0.85rem;
    }

    .category-title {
      font-size: 1.3rem;
      font-weight: 600;
      margin: 40px 0 20px 0;
      border-left: 4px solid var(--purple);
      padding-left: 16px;
    }
    .category-title i {
      margin-right: 10px;
      color: var(--purple);
    }

    /* LIST VIEW - like desktop mode */
    .products-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 40px;
    }

    .product-item {
      background: linear-gradient(135deg, #0a0a1a, #0a1a3a);
      border-radius: 16px;
      border: 1px solid rgba(127,42,235,0.3);
      padding: 16px 20px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .product-item:hover {
      border-color: var(--purple);
      transform: translateX(5px);
    }
    .product-info-left {
      flex: 2;
      min-width: 150px;
    }
    .product-title {
      font-size: 1rem;
      font-weight: 700;
      color: white;
    }
    .product-price {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--green);
      margin-top: 4px;
    }
    .add-to-cart-btn {
      background: var(--purple);
      border: none;
      color: white;
      padding: 10px 24px;
      border-radius: 40px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.8rem;
      transition: 0.2s;
      white-space: nowrap;
    }
    .add-to-cart-btn:hover {
      background: #5e1ca8;
      transform: scale(0.97);
    }

    footer {
      text-align: center;
      padding: 30px;
      border-top: 1px solid rgba(127,42,235,0.2);
      margin-top: 40px;
      font-size: 0.75rem;
    }

    @media (max-width: 500px) {
      .product-item {
        flex-direction: column;
        text-align: center;
      }
      .add-to-cart-btn {
        width: 100%;
      }
      .logo img { max-height: 120px; }
      .hero h2 { font-size: 1.4rem; }
    }

    .cart-overlay {
      position: fixed;
      top: 0;
      right: -400px;
      width: 380px;
      max-width: 90vw;
      height: 100%;
      background: #0b0b1a;
      z-index: 1001;
      transition: right 0.3s;
      padding: 24px;
      border-left: 3px solid var(--purple);
      overflow-y: auto;
    }
    .cart-overlay.open { right: 0; }
    .close-cart {
      float: right;
      font-size: 1.6rem;
      cursor: pointer;
      background: none;
      border: none;
      color: white;
    }
    .cart-items { max-height: 55vh; overflow-y: auto; margin: 20px 0; }
    .cart-total { font-size: 1.3rem; font-weight: bold; border-top: 1px solid #333; padding-top: 16px; }
    .checkout-btn {
      background: var(--green);
      width: 100%;
      padding: 12px;
      border-radius: 40px;
      font-weight: bold;
      margin-top: 20px;
      border: none;
      cursor: pointer;
    }
    .remove-item {
      background: var(--red);
      border: none;
      color: white;
      padding: 5px 10px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.7rem;
    }
    .paypal-note {
      text-align: center;
      margin-top: 12px;
      font-size: 0.7rem;
      color: #666;
    }

    /* WHITE POPUP MODAL */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }
    .modal.show {
      display: flex;
    }
    .modal-content {
      background: white;
      border-radius: 28px;
      width: 90%;
      max-width: 360px;
      padding: 24px 20px;
      text-align: center;
      animation: modalFadeIn 0.3s ease;
    }
    @keyframes modalFadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
    .modal-content h3 {
      color: #1a1a2e;
      font-size: 1.3rem;
      margin-bottom: 8px;
      font-weight: 700;
    }
    .modal-content .modal-price {
      color: #10b981;
      font-size: 1.2rem;
      font-weight: 800;
      margin-bottom: 20px;
    }
    .modal-section-title {
      color: #666;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 15px 0 10px;
      text-align: left;
    }
    .modal-sizes {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 10px;
    }
    .modal-size-btn {
      background: #f0f0f0;
      padding: 8px 16px;
      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      color: #1a1a2e;
      border: 1px solid #ddd;
    }
    .modal-size-btn:hover, .modal-size-btn.selected {
      background: #7f2aeb;
      color: white;
    }
    .modal-colors {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 20px;
    }
    .modal-color-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid transparent;
    }
    .modal-color-btn:hover, .modal-color-btn.selected {
      border-color: #7f2aeb;
      transform: scale(1.1);
    }
    .modal-confirm {
      background: #7f2aeb;
      color: white;
      border: none;
      padding: 14px 0;
      width: 100%;
      border-radius: 50px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 15px;
    }
    .modal-close {
      margin-top: 12px;
      background: none;
      border: none;
      color: #999;
      font-size: 0.85rem;
      cursor: pointer;
    }
  </style>
</head>
<body>

<!-- White Popup Modal -->
<div id="sizeColorModal" class="modal">
  <div class="modal-content">
    <h3 id="modalProductName">Product Name</h3>
    <div class="modal-price" id="modalProductPrice">R0.00</div>
    <div class="modal-section-title">SELECT SIZE</div>
    <div class="modal-sizes" id="modalSizes"></div>
    <div class="modal-section-title">SELECT COLOR</div>
    <div class="modal-colors" id="modalColors"></div>
    <button class="modal-confirm" id="modalConfirmBtn">ADD TO CART</button>
    <button class="modal-close" id="modalCloseBtn">CANCEL</button>
  </div>
</div>

<!-- Sticky Navigation Bar -->
<div class="sticky-nav" id="stickyNav">
  <div class="sticky-nav-links">
    <a href="#" class="sticky-tshirts">T-SHIRTS</a>
    <a href="#" class="sticky-sweaters">SWEATERS</a>
    <a href="#" class="sticky-hoodies">HOODIES</a>
  </div>
  <div class="sticky-cart" id="stickyCartIcon">
    <i class="fas fa-bag-shopping"></i>
    <span class="cart-count-sticky" id="stickyCartCount">0</span>
  </div>
</div>

<!-- Full Header -->
<div class="site-header" id="mainHeader">
  <div class="container header-inner">
    <div class="logo">
      <img src="fargo1.png" alt="MrYoungFargo" onerror="this.src='https://placehold.co/400x180?text=MrYoungFargo'">
    </div>
    <div class="nav-links">
      <a href="#" class="nav-tshirts">T-SHIRTS</a>
      <a href="#" class="nav-sweaters">SWEATERS</a>
      <a href="#" class="nav-hoodies">HOODIES</a>
    </div>
    <div class="cart-icon" id="cartIcon">
      <i class="fas fa-bag-shopping"></i>
      <span class="cart-count" id="cartCount">0</span>
    </div>
  </div>
</div>

<section class="hero">
  <div class="container">
    <h2>MRYOUNGFARGO MERCH</h2>
    <p>Premium quality • Streetwear essentials</p>
  </div>
</section>

<div class="container">
  <div id="tshirts-section">
    <div class="category-title"><i class="fas fa-tshirt"></i> T-SHIRTS</div>
    <div class="products-list" id="tshirtsList"></div>
  </div>

  <div id="sweaters-section">
    <div class="category-title"><i class="fas fa-vest"></i> SWEATERS</div>
    <div class="products-list" id="sweatersList"></div>
  </div>

  <div id="hoodies-section">
    <div class="category-title"><i class="fas fa-hoodie"></i> HOODIES</div>
    <div class="products-list" id="hoodiesList"></div>
  </div>
</div>

<footer>
  <p>© 2025 MrYoungFargo — All Rights Reserved</p>
</footer>

<div id="cartSidebar" class="cart-overlay">
  <button class="close-cart" id="closeCartBtn">&times;</button>
  <h2><i class="fas fa-shopping-cart"></i> CART</h2>
  <div id="cartItemsList" class="cart-items"></div>
  <div class="cart-total" id="cartTotalPrice">R0.00</div>
  <button class="checkout-btn" id="checkoutBtn">PROCEED TO CHECKOUT →</button>
  <div class="paypal-note">Payment options available at checkout</div>
</div>

<script>
  const availableColors = [
    { name: "Red", value: "Red", bg: "#e11d2c" },
    { name: "Black", value: "Black", bg: "#1a1a1a" },
    { name: "Green", value: "Green", bg: "#10b981" },
    { name: "Blue", value: "Blue", bg: "#3b82f6" }
  ];

  const tshirts = [
    { id: 1, name: "Neon Duets T-Shirt", price: 179.99, image: "t-shirt1.png", sizes: ["XS","S","M","L","XL","XXL"] },
    { id: 2, name: "Duets Lover T-Shirt", price: 179.99, image: "t-shirt2.png", sizes: ["XS","S","M","L","XL","XXL"] },
    { id: 3, name: "Duets Glitch T-Shirt", price: 179.99, image: "t-shirt3.png", sizes: ["XS","S","M","L","XL","XXL"] },
    { id: 4, name: "Sleeper T-Shirt", price: 179.99, image: "t-shirt4.png", sizes: ["XS","S","M","L","XL","XXL"] },
    { id: 5, name: "Sabaring T-Shirt", price: 179.99, image: "t-shirt4.png", sizes: ["XS","S","M","L","XL","XXL"] },
    { id: 6, name: "Monalisa Sabaring T-Shirt", price: 179.99, image: "t-shirt5.png", sizes: ["XS","S","M","L","XL","XXL"] }
  ];

  const sweaters = [
    { id: 7, name: "Sabaring Sweater", price: 329.99, image: "sweater1.png", sizes: ["XS","S","M","L","XL","XXL"] },
    { id: 8, name: "Neon Duets Sweater", price: 329.99, image: "sweater2.png", sizes: ["XS","S","M","L","XL","XXL"] },
    { id: 9, name: "Duets Lover Sweater", price: 329.99, image: "sweater3.png", sizes: ["XS","S","M","L","XL","XXL"] },
    { id: 10, name: "Duets Glitch Sweater", price: 329.99, image: "sweater4.png", sizes: ["XS","S","M","L","XL","XXL"] }
  ];

  const hoodies = [
    { id: 11, name: "Duets Lover Hoodie", price: 379.99, image: "hoodie1.png", sizes: ["XS","S","M","L","XL","XXL"] },
    { id: 12, name: "Duets Glitch Hoodie", price: 379.99, image: "hoodie2.png", sizes: ["XS","S","M","L","XL","XXL"] }
  ];

  const allProducts = [...tshirts, ...sweaters, ...hoodies];
  let cart = [];
  let currentProduct = null;
  let currentSize = null;
  let currentColor = null;

  function saveCart() {
    localStorage.setItem("mryoungfargo_cart", JSON.stringify(cart));
    updateCartUI();
  }

  function loadCart() {
    const saved = localStorage.getItem("mryoungfargo_cart");
    if (saved) cart = JSON.parse(saved);
    updateCartUI();
  }

  function updateCartUI() {
    const count = cart.reduce((s, i) => s + i.qty, 0);
    document.getElementById("cartCount").innerText = count;
    document.getElementById("stickyCartCount").innerText = count;
    const container = document.getElementById("cartItemsList");
    let total = 0;
    if (cart.length === 0) {
      container.innerHTML = "<p style='text-align:center;color:gray;'>Cart is empty</p>";
      document.getElementById("cartTotalPrice").innerText = "R0.00";
      return;
    }
    let html = "";
    cart.forEach((item) => {
      const itemTotal = item.price * item.qty;
      total += itemTotal;
      html += `<div style="border-bottom:1px solid #333; padding:12px 0; display:flex; justify-content:space-between; align-items:center;">
        <div><strong>${item.name}</strong><br>Size: ${item.size}<br>Color: ${item.color}<br>R${item.price.toFixed(2)} x ${item.qty}</div>
        <button class="remove-item" data-id="${item.id}" data-size="${item.size}" data-color="${item.color}">Remove</button>
      </div>`;
    });
    container.innerHTML = html;
    document.getElementById("cartTotalPrice").innerText = `R${total.toFixed(2)}`;
    document.querySelectorAll(".remove-item").forEach(btn => {
      btn.addEventListener("click", () => {
        const id = parseInt(btn.dataset.id);
        const size = btn.dataset.size;
        const color = btn.dataset.color;
        cart = cart.filter(i => !(i.id === id && i.size === size && i.color === color));
        saveCart();
      });
    });
  }

  function addToCart(product, size, color) {
    if (!size) { alert("Please select a size!"); return false; }
    if (!color) { alert("Please select a color!"); return false; }
    const existing = cart.find(i => i.id === product.id && i.size === size && i.color === color);
    if (existing) existing.qty++;
    else cart.push({ id: product.id, name: product.name, price: product.price, size: size, color: color, qty: 1 });
    saveCart();
    document.getElementById("cartSidebar").classList.add("open");
    return true;
  }

  function showModal(product) {
    currentProduct = product;
    currentSize = null;
    currentColor = null;
    
    document.getElementById("modalProductName").innerText = product.name;
    document.getElementById("modalProductPrice").innerText = `R${product.price.toFixed(2)}`;
    
    const sizesContainer = document.getElementById("modalSizes");
    sizesContainer.innerHTML = "";
    product.sizes.forEach(size => {
      const btn = document.createElement("div");
      btn.className = "modal-size-btn";
      btn.innerText = size;
      btn.onclick = () => {
        document.querySelectorAll(".modal-size-btn").forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
        currentSize = size;
      };
      sizesContainer.appendChild(btn);
    });
    
    const colorsContainer = document.getElementById("modalColors");
    colorsContainer.innerHTML = "";
    availableColors.forEach(color => {
      const btn = document.createElement("div");
      btn.className = "modal-color-btn";
      btn.style.backgroundColor = color.bg;
      btn.title = color.name;
      btn.onclick = () => {
        document.querySelectorAll(".modal-color-btn").forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
        currentColor = color.value;
      };
      colorsContainer.appendChild(btn);
    });
    
    document.getElementById("sizeColorModal").classList.add("show");
  }

  function closeModal() {
    document.getElementById("sizeColorModal").classList.remove("show");
  }

  function confirmAdd() {
    if (!currentSize) { alert("Please select a size!"); return; }
    if (!currentColor) { alert("Please select a color!"); return; }
    addToCart(currentProduct, currentSize, currentColor);
    closeModal();
  }

  function renderList(productsArray, containerId) {
    const container = document.getElementById(containerId);
    if (!container) return;
    container.innerHTML = "";
    productsArray.forEach(prod => {
      const item = document.createElement("div");
      item.className = "product-item";
      item.innerHTML = `
        <div class="product-info-left">
          <div class="product-title">${prod.name}</div>
          <div class="product-price">R${prod.price.toFixed(2)}</div>
        </div>
        <button class="add-to-cart-btn" data-id="${prod.id}">ADD TO CART</button>
      `;
      container.appendChild(item);
    });
    
    container.querySelectorAll(".add-to-cart-btn").forEach(btn => {
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        const id = parseInt(btn.dataset.id);
        const product = allProducts.find(p => p.id === id);
        showModal(product);
      });
    });
    
    container.querySelectorAll(".product-item").forEach(item => {
      item.addEventListener("click", (e) => {
        if (e.target.classList.contains("add-to-cart-btn")) return;
        const btn = item.querySelector(".add-to-cart-btn");
        if (btn) {
          const id = parseInt(btn.dataset.id);
          const product = allProducts.find(p => p.id === id);
          showModal(product);
        }
      });
    });
  }

  // Sticky scroll
  window.addEventListener("scroll", () => {
    const sticky = document.getElementById("stickyNav");
    if (window.scrollY > 150) sticky.classList.add("show");
    else sticky.classList.remove("show");
  });

  function setupNav() {
    const sections = [
      { class: ".nav-tshirts", id: "tshirts-section" },
      { class: ".nav-sweaters", id: "sweaters-section" },
      { class: ".nav-hoodies", id: "hoodies-section" },
      { class: ".sticky-tshirts", id: "tshirts-section" },
      { class: ".sticky-sweaters", id: "sweaters-section" },
      { class: ".sticky-hoodies", id: "hoodies-section" }
    ];
    sections.forEach(s => {
      document.querySelectorAll(s.class).forEach(el => {
        el.addEventListener("click", (e) => {
          e.preventDefault();
          document.getElementById(s.id).scrollIntoView({ behavior: "smooth" });
        });
      });
    });
  }

  document.getElementById("cartIcon")?.addEventListener("click", () => document.getElementById("cartSidebar").classList.add("open"));
  document.getElementById("stickyCartIcon")?.addEventListener("click", () => document.getElementById("cartSidebar").classList.add("open"));
  document.getElementById("closeCartBtn")?.addEventListener("click", () => document.getElementById("cartSidebar").classList.remove("open"));
  document.getElementById("checkoutBtn")?.addEventListener("click", () => {
    if (cart.length === 0) alert("Your cart is empty!");
    else {
      let total = cart.reduce((sum, i) => sum + (i.price * i.qty), 0);
      alert(`✅ Checkout Total: R${total.toFixed(2)}\n\nPayment options available.`);
    }
  });
  
  document.getElementById("modalConfirmBtn")?.addEventListener("click", confirmAdd);
  document.getElementById("modalCloseBtn")?.addEventListener("click", closeModal);
  window.addEventListener("click", (e) => {
    if (e.target === document.getElementById("sizeColorModal")) closeModal();
  });

  renderList(tshirts, "tshirtsList");
  renderList(sweaters, "sweatersList");
  renderList(hoodies, "hoodiesList");
  setupNav();
  loadCart();
</script>
</body>
</html>
