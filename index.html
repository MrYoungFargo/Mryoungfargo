<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DUETS | Official Merch Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #000000;
      color: #f0f0f0;
      line-height: 1.5;
    }

    :root {
      --black: #000000;
      --red: #e11d2c;
      --green: #10b981;
      --blue: #3b82f6;
      --card-bg: #111111;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .site-header {
      background-color: var(--black);
      border-bottom: 1px solid #222;
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(0,0,0,0.95);
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      padding: 20px 0;
      gap: 20px;
    }

    .logo h1 {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--red), var(--blue), var(--green));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .nav-links {
      display: flex;
      gap: 32px;
    }
    .nav-links a {
      color: #ddd;
      text-decoration: none;
      font-weight: 600;
    }
    .nav-links a:hover { color: var(--red); }

    .cart-icon {
      position: relative;
      cursor: pointer;
      font-size: 1.6rem;
    }
    .cart-count {
      position: absolute;
      top: -8px;
      right: -12px;
      background: var(--red);
      color: white;
      font-size: 0.7rem;
      border-radius: 30px;
      padding: 2px 6px;
    }

    .hero {
      background: radial-gradient(circle at 10% 30%, #0a0f1a, #000000);
      padding: 60px 0;
      text-align: center;
    }
    .hero h2 {
      font-size: 3rem;
      font-weight: 800;
    }
    .hero p {
      color: #aaa;
      margin-top: 16px;
    }

    .section-title {
      font-size: 2rem;
      font-weight: 700;
      margin: 60px 0 32px 0;
      border-left: 5px solid var(--red);
      padding-left: 20px;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 32px;
      margin-bottom: 60px;
    }

    .product-card {
      background: var(--card-bg);
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid #2a2a2a;
      transition: transform 0.2s;
      position: relative;
    }
    .product-card:hover {
      transform: translateY(-5px);
      border-color: var(--red);
    }

    .discount-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: var(--red);
      color: white;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: bold;
      z-index: 2;
    }

    .product-img {
      background: #1a1a1a;
      height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
    }

    .product-info {
      padding: 20px;
    }

    .product-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .product-price {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--green);
      margin: 10px 0;
    }
    .product-price small {
      font-size: 0.8rem;
      color: #888;
    }

    .size-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 15px 0;
    }
    .size-btn {
      background: #1f1f1f;
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid #333;
    }
    .size-btn:hover, .size-btn.selected {
      background: var(--red);
      border-color: var(--red);
    }

    .add-to-cart {
      background: var(--red);
      border: none;
      color: white;
      padding: 12px 0;
      width: 100%;
      border-radius: 40px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .add-to-cart:hover {
      background: #b91c2c;
    }

    .bulk-offer {
      background: linear-gradient(135deg, #1a1a2e, #0a0a0a);
      border: 2px dashed var(--green);
      border-radius: 20px;
      padding: 30px;
      text-align: center;
      margin: 40px 0;
    }
    .bulk-offer h3 {
      font-size: 1.8rem;
      color: var(--green);
    }
    .bulk-offer p {
      font-size: 1.2rem;
      margin-top: 10px;
    }

    footer {
      text-align: center;
      padding: 40px;
      border-top: 1px solid #222;
      margin-top: 60px;
    }

    @media (max-width: 768px) {
      .hero h2 { font-size: 2rem; }
      .header-inner { flex-direction: column; }
    }

    .cart-overlay {
      position: fixed;
      top: 0;
      right: -400px;
      width: 380px;
      max-width: 90vw;
      height: 100%;
      background: #0b0b0b;
      z-index: 1000;
      transition: right 0.3s;
      padding: 24px;
      border-left: 3px solid var(--green);
    }
    .cart-overlay.open { right: 0; }
    .close-cart {
      float: right;
      font-size: 1.8rem;
      cursor: pointer;
      background: none;
      border: none;
      color: white;
    }
    .cart-items { max-height: 60vh; overflow-y: auto; margin: 20px 0; }
    .cart-total { font-size: 1.5rem; font-weight: bold; border-top: 1px solid #333; padding-top: 16px; }
    .checkout-btn {
      background: var(--green);
      width: 100%;
      padding: 14px;
      border-radius: 40px;
      font-weight: bold;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<div class="site-header">
  <div class="container header-inner">
    <div class="logo"><h1>DUETS</h1></div>
    <div class="nav-links">
      <a href="#">SHOP</a>
      <a href="#">SIZE GUIDE</a>
      <a href="#">COLLECTION</a>
    </div>
    <div class="cart-icon" id="cartIcon">
      <i class="fas fa-bag-shopping"></i>
      <span class="cart-count" id="cartCount">0</span>
    </div>
  </div>
</div>

<section class="hero">
  <div class="container">
    <h2>DUETS MERCH</h2>
    <p>Premium quality • Streetwear essentials</p>
  </div>
</section>

<div class="container">
  <div class="section-title"><i class="fas fa-tshirt"></i> NEW ARRIVALS</div>
  <div class="products-grid" id="productGrid"></div>
</div>

<div class="container">
  <div class="bulk-offer">
    <h3>🔥 20% OFF 🔥</h3>
    <p>BUY 3 OR MORE ITEMS • AUTOMATIC DISCOUNT AT CHECKOUT</p>
  </div>
</div>

<footer>
  <p>© 2025 DUETS — All Rights Reserved</p>
</footer>

<div id="cartSidebar" class="cart-overlay">
  <button class="close-cart" id="closeCartBtn">&times;</button>
  <h2><i class="fas fa-shopping-cart"></i> CART</h2>
  <div id="cartItemsList" class="cart-items"></div>
  <div class="cart-total" id="cartTotalPrice">R0.00</div>
  <button class="checkout-btn" id="checkoutBtn">CHECKOUT →</button>
</div>

<script>
  const products = [
    { id: 1, name: "CLASSIC T-SHIRT", price: 299, type: "T-Shirt", sizes: ["XS","S","M","L","XL","XXL"] },
    { id: 2, name: "OVERSIZED HOODIE", price: 599, type: "Hoodie", sizes: ["XS","S","M","L","XL","XXL"] },
    { id: 3, name: "COMFORT SWEATER", price: 449, type: "Sweater", sizes: ["XS","S","M","L","XL","XXL"] },
    { id: 4, name: "GOLF SHIRT", price: 399, type: "Golf Shirt", sizes: ["XS","S","M","L","XL","XXL"] },
    { id: 5, name: "PREMIUM TEE", price: 349, type: "T-Shirt", sizes: ["XS","S","M","L","XL","XXL"] },
    { id: 6, name: "ZIP HOODIE", price: 649, type: "Hoodie", sizes: ["XS","S","M","L","XL","XXL"] }
  ];

  let cart = [];

  function saveCart() {
    localStorage.setItem("duets_cart", JSON.stringify(cart));
    updateCartUI();
  }

  function loadCart() {
    const saved = localStorage.getItem("duets_cart");
    if (saved) cart = JSON.parse(saved);
    updateCartUI();
  }

  function updateCartUI() {
    const count = cart.reduce((s, i) => s + i.qty, 0);
    document.getElementById("cartCount").innerText = count;
    const container = document.getElementById("cartItemsList");
    let total = 0;
    if (cart.length === 0) {
      container.innerHTML = "<p style='text-align:center;color:gray;'>Cart is empty</p>";
      document.getElementById("cartTotalPrice").innerText = "R0.00";
      return;
    }
    let html = "";
    cart.forEach((item, idx) => {
      const itemTotal = item.price * item.qty;
      total += itemTotal;
      html += `<div style="border-bottom:1px solid #333; padding:12px 0; display:flex; justify-content:space-between;">
        <div><strong>${item.name}</strong><br>Size: ${item.size}<br>R${item.price} x ${item.qty}</div>
        <button class="remove-item" data-id="${item.id}" data-size="${item.size}" style="background:var(--red); border:none; color:white; padding:6px 12px; border-radius:20px;">Remove</button>
      </div>`;
    });
    container.innerHTML = html;
    document.getElementById("cartTotalPrice").innerText = `R${total.toFixed(2)}`;
    document.querySelectorAll(".remove-item").forEach(btn => {
      btn.addEventListener("click", () => {
        const id = parseInt(btn.dataset.id);
        const size = btn.dataset.size;
        cart = cart.filter(i => !(i.id === id && i.size === size));
        saveCart();
      });
    });
  }

  function addToCart(product, size) {
    if (!size) { alert("Please select a size!"); return false; }
    const existing = cart.find(i => i.id === product.id && i.size === size);
    if (existing) existing.qty++;
    else cart.push({ ...product, size: size, qty: 1 });
    saveCart();
    document.getElementById("cartSidebar").classList.add("open");
    return true;
  }

  function renderProducts() {
    const grid = document.getElementById("productGrid");
    grid.innerHTML = "";
    products.forEach(prod => {
      const card = document.createElement("div");
      card.className = "product-card";
      let icon = "👕";
      if (prod.type === "Hoodie") icon = "🧥";
      if (prod.type === "Sweater") icon = "🧶";
      if (prod.type === "Golf Shirt") icon = "⛳";
      card.innerHTML = `
        <div class="discount-badge">20% OFF on 3+</div>
        <div class="product-img"><i class="fas fa-tshirt" style="font-size:3rem;"></i> ${icon}</div>
        <div class="product-info">
          <div class="product-title">${prod.name}</div>
          <div class="product-price">R${prod.price}<small>.00</small></div>
          <div class="size-row" data-id="${prod.id}">
            ${prod.sizes.map(s => `<span class="size-btn" data-size="${s}">${s}</span>`).join('')}
          </div>
          <button class="add-to-cart" data-id="${prod.id}"><i class="fas fa-cart-plus"></i> ADD TO CART</button>
        </div>
      `;
      grid.appendChild(card);
    });
    document.querySelectorAll(".size-btn").forEach(btn => {
      btn.addEventListener("click", (e) => {
        const parent = btn.closest(".size-row");
        parent.querySelectorAll(".size-btn").forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
      });
    });
    document.querySelectorAll(".add-to-cart").forEach(btn => {
      btn.addEventListener("click", (e) => {
        const id = parseInt(btn.dataset.id);
        const product = products.find(p => p.id === id);
        const sizeRow = btn.closest(".product-info").querySelector(".size-row");
        const selected = sizeRow.querySelector(".size-btn.selected");
        const size = selected ? selected.dataset.size : null;
        addToCart(product, size);
      });
    });
  }

  document.getElementById("cartIcon")?.addEventListener("click", () => document.getElementById("cartSidebar").classList.add("open"));
  document.getElementById("closeCartBtn")?.addEventListener("click", () => document.getElementById("cartSidebar").classList.remove("open"));
  document.getElementById("checkoutBtn")?.addEventListener("click", () => {
    if (cart.length === 0) alert("Cart is empty");
    else alert(`✅ Checkout: Total ${document.getElementById("cartTotalPrice").innerText}\n(20% discount applied automatically for 3+ items in real store)`);
  });

  renderProducts();
  loadCart();
</script>
</body>
</html>
