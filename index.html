<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>MrYoungFargo Merch | 3‑Column Grid</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0a0f1a 0%, #1a0a2e 50%, #2a0a4e 100%);
      color: #f0f0f0;
      line-height: 1.5;
    }

    :root {
      --red: #e11d2c;
      --green: #10b981;
      --purple: #7f2aeb;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* ----- HEADER (black+blue gradient, no box around logo) ----- */
    .site-header {
      background: linear-gradient(135deg, #000000, #0a2a5a, #000000, #0a2a5a);
      background-size: 300% 300%;
      border-bottom: 1px solid rgba(127,42,235,0.3);
      animation: headerGradient 4s ease infinite;
    }
    @keyframes headerGradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      padding: 20px 0;
      gap: 20px;
    }

    .logo {
      flex: 1;
      text-align: center;
    }
    .logo img {
      max-height: 170px;
      width: auto;
      animation: spin3D 10s ease-in-out infinite;
      transform-style: preserve-3d;
      perspective: 1000px;
    }
    @keyframes spin3D {
      0% { transform: rotateY(0deg); }
      50% { transform: rotateY(180deg); }
      100% { transform: rotateY(360deg); }
    }

    /* ----- STICKY NAV ----- */
    .sticky-nav {
      position: fixed;
      top: -100px;
      left: 0;
      width: 100%;
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(127,42,235,0.4);
      padding: 12px 20px;
      z-index: 1000;
      transition: top 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 48px;
    }
    .sticky-nav.show { top: 0; }
    .sticky-nav a {
      color: #ddd;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
    }
    .sticky-nav a:hover { color: var(--purple); }
    .sticky-cart {
      position: relative;
      cursor: pointer;
      font-size: 1.4rem;
      color: white;
      margin-left: auto;
    }
    .sticky-cart .cart-count-sticky {
      position: absolute;
      top: -8px;
      right: -12px;
      background: var(--red);
      color: white;
      font-size: 0.7rem;
      border-radius: 30px;
      padding: 2px 6px;
    }
    .sticky-nav-links {
      display: flex;
      gap: 48px;
    }

    /* desktop nav */
    .nav-links {
      display: flex;
      gap: 32px;
    }
    .nav-links a {
      color: #ddd;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
    }
    .nav-links a:hover { color: var(--purple); }

    .cart-icon {
      position: relative;
      cursor: pointer;
      font-size: 1.4rem;
    }
    .cart-count {
      position: absolute;
      top: -8px;
      right: -12px;
      background: var(--red);
      color: white;
      font-size: 0.7rem;
      border-radius: 30px;
      padding: 2px 6px;
    }

    .hero {
      padding: 50px 0;
      text-align: center;
    }
    .hero h2 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #fff, var(--purple));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .hero p {
      color: #aaa;
      margin-top: 12px;
    }

    .category-title {
      font-size: 1.7rem;
      font-weight: 700;
      margin: 50px 0 30px 0;
      border-left: 5px solid var(--purple);
      padding-left: 20px;
    }
    .category-title i {
      margin-right: 12px;
      color: var(--purple);
    }

    /* ----- 3 COLUMNS – FORCED, NO BREAKPOINT TO 2 COLUMNS ----- */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 28px;
      margin-bottom: 60px;
    }

    /* even on small screens, keep 3 columns – user insisted */
    @media (max-width: 800px) {
      .products-grid {
        gap: 16px;
      }
      .product-title { font-size: 0.9rem; }
      .product-price { font-size: 1rem; }
    }
    @media (max-width: 600px) {
      .products-grid {
        gap: 12px;
      }
    }

    .product-card {
      background: linear-gradient(135deg, #0a0a1a, #0a1a3a);
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid rgba(127,42,235,0.3);
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      display: flex;
      flex-direction: column;
    }
    .product-card:hover {
      transform: translateY(-6px);
      border-color: var(--purple);
      box-shadow: 0 15px 30px -12px rgba(127,42,235,0.3);
    }

    .product-img {
      background: #0d0d1a;
      height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .product-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .no-img {
      font-size: 2rem;
      color: #888;
    }

    .product-info {
      padding: 18px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .product-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .product-price {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--green);
      margin: 8px 0;
    }
    .add-to-cart-btn {
      background: var(--purple);
      border: none;
      color: white;
      padding: 10px 0;
      width: 100%;
      border-radius: 40px;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      transition: 0.2s;
      margin-top: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .add-to-cart-btn:hover {
      background: #5e1ca8;
      transform: scale(0.97);
    }

    footer {
      text-align: center;
      padding: 40px;
      border-top: 1px solid rgba(127,42,235,0.2);
      margin-top: 40px;
    }

    /* Cart sidebar */
    .cart-overlay {
      position: fixed;
      top: 0;
      right: -420px;
      width: 380px;
      max-width: 90vw;
      height: 100%;
      background: #0b0b1a;
      z-index: 1001;
      transition: right 0.3s;
      padding: 24px;
      border-left: 3px solid var(--purple);
      overflow-y: auto;
    }
    .cart-overlay.open { right: 0; }
    .close-cart {
      float: right;
      font-size: 1.8rem;
      cursor: pointer;
      background: none;
      border: none;
      color: white;
    }
    .cart-items { max-height: 55vh; overflow-y: auto; margin: 20px 0; }
    .cart-total { font-size: 1.4rem; font-weight: bold; border-top: 1px solid #333; padding-top: 16px; }
    .checkout-btn {
      background: var(--green);
      width: 100%;
      padding: 14px;
      border-radius: 40px;
      font-weight: bold;
      margin-top: 20px;
      border: none;
      cursor: pointer;
    }
    .remove-item {
      background: var(--red);
      border: none;
      color: white;
      padding: 5px 12px;
      border-radius: 20px;
      cursor: pointer;
    }

    /* White modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }
    .modal.show { display: flex; }
    .modal-content {
      background: white;
      border-radius: 28px;
      width: 90%;
      max-width: 360px;
      padding: 24px 20px;
      text-align: center;
      animation: fadeIn 0.2s;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
    .modal-content h3 { color: #1a1a2e; font-size: 1.3rem; }
    .modal-price { color: #10b981; font-size: 1.2rem; font-weight: 800; margin: 8px 0 20px; }
    .modal-section-title { color: #666; font-size: 0.7rem; text-transform: uppercase; text-align: left; margin: 15px 0 8px; }
    .modal-sizes, .modal-colors { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 8px; }
    .modal-size-btn {
      background: #f0f0f0; padding: 8px 16px; border-radius: 40px; font-size: 0.85rem;
      font-weight: 600; cursor: pointer; color: #1a1a2e; border: 1px solid #ddd;
    }
    .modal-size-btn.selected, .modal-size-btn:hover { background: #7f2aeb; color: white; }
    .modal-color-btn {
      width: 40px; height: 40px; border-radius: 50%; cursor: pointer; border: 3px solid transparent;
    }
    .modal-color-btn.selected, .modal-color-btn:hover { border-color: #7f2aeb; transform: scale(1.05); }
    .modal-confirm {
      background: #7f2aeb; color: white; border: none; padding: 12px 0; width: 100%;
      border-radius: 50px; font-weight: 700; margin-top: 20px; cursor: pointer;
    }
    .modal-close { background: none; border: none; color: #999; margin-top: 12px; cursor: pointer; }
  </style>
</head>
<body>

<!-- Modal -->
<div id="sizeColorModal" class="modal">
  <div class="modal-content">
    <h3 id="modalProductName">Product</h3>
    <div class="modal-price" id="modalProductPrice">R0.00</div>
    <div class="modal-section-title">SIZE</div>
    <div class="modal-sizes" id="modalSizes"></div>
    <div class="modal-section-title">COLOR</div>
    <div class="modal-colors" id="modalColors"></div>
    <button class="modal-confirm" id="modalConfirmBtn">ADD TO CART</button>
    <button class="modal-close" id="modalCloseBtn">CANCEL</button>
  </div>
</div>

<!-- Sticky Nav -->
<div class="sticky-nav" id="stickyNav">
  <div class="sticky-nav-links">
    <a href="#" class="sticky-tshirts">T-SHIRTS</a>
    <a href="#" class="sticky-sweaters">SWEATERS</a>
    <a href="#" class="sticky-hoodies">HOODIES</a>
  </div>
  <div class="sticky-cart" id="stickyCartIcon">
    <i class="fas fa-bag-shopping"></i>
    <span class="cart-count-sticky" id="stickyCartCount">0</span>
  </div>
</div>

<!-- Main Header -->
<div class="site-header">
  <div class="container header-inner">
    <div class="logo">
      <img src="fargo1.png" alt="MrYoungFargo" onerror="this.src='https://placehold.co/400x170?text=MrYoungFargo'">
    </div>
    <div class="nav-links">
      <a href="#" class="nav-tshirts">T-SHIRTS</a>
      <a href="#" class="nav-sweaters">SWEATERS</a>
      <a href="#" class="nav-hoodies">HOODIES</a>
    </div>
    <div class="cart-icon" id="cartIcon">
      <i class="fas fa-bag-shopping"></i>
      <span class="cart-count" id="cartCount">0</span>
    </div>
  </div>
</div>

<section class="hero">
  <div class="container">
    <h2>MRYOUNGFARGO MERCH</h2>
    <p>Premium quality • Streetwear essentials</p>
  </div>
</section>

<div class="container">
  <div id="tshirts-section">
    <div class="category-title"><i class="fas fa-tshirt"></i> T-SHIRTS</div>
    <div class="products-grid" id="tshirtsGrid"></div>
  </div>
  <div id="sweaters-section">
    <div class="category-title"><i class="fas fa-vest"></i> SWEATERS</div>
    <div class="products-grid" id="sweatersGrid"></div>
  </div>
  <div id="hoodies-section">
    <div class="category-title"><i class="fas fa-hoodie"></i> HOODIES</div>
    <div class="products-grid" id="hoodiesGrid"></div>
  </div>
</div>

<footer>
  <p>© 2025 MrYoungFargo — All Rights Reserved</p>
</footer>

<div id="cartSidebar" class="cart-overlay">
  <button class="close-cart" id="closeCartBtn">&times;</button>
  <h2><i class="fas fa-shopping-cart"></i> CART</h2>
  <div id="cartItemsList" class="cart-items"></div>
  <div class="cart-total" id="cartTotalPrice">R0.00</div>
  <button class="checkout-btn" id="checkoutBtn">PROCEED TO CHECKOUT →</button>
</div>

<script>
  // ----- COLORS -----
  const colors = [
    { name: "Red", value: "Red", bg: "#e11d2c" },
    { name: "Black", value: "Black", bg: "#1a1a1a" },
    { name: "Green", value: "Green", bg: "#10b981" },
    { name: "Blue", value: "Blue", bg: "#3b82f6" }
  ];

  // ----- PRODUCTS (exactly as in your screenshot, with images) -----
  const tshirts = [
    { id: 1, name: "Neon Duets T-Shirt", price: 179.99, image: "t-shirt1.png", sizes: ["XS","S","M","L","XL","XXL"] },
    { id: 2, name: "Duets Lover T-Shirt", price: 179.99, image: "t-shirt2.png", sizes: ["XS","S","M","L","XL","XXL"] },
    { id: 3, name: "Duets Glitch T-Shirt", price: 179.99, image: "t-shirt3.png", sizes: ["XS","S","M","L","XL","XXL"] },
    { id: 4, name: "Sleeper T-Shirt", price: 179.99, image: "t-shirt4.png", sizes: ["XS","S","M","L","XL","XXL"] },
    { id: 5, name: "Sabaring T-Shirt", price: 179.99, image: "t-shirt4.png", sizes: ["XS","S","M","L","XL","XXL"] },
    { id: 6, name: "Monalisa Sabaring T-Shirt", price: 179.99, image: "t-shirt5.png", sizes: ["XS","S","M","L","XL","XXL"] }
  ];

  const sweaters = [
    { id: 7, name: "Sabaring Sweater", price: 329.99, image: "sweater1.png", sizes: ["XS","S","M","L","XL","XXL"] },
    { id: 8, name: "Neon Duets Sweater", price: 329.99, image: "sweater2.png", sizes: ["XS","S","M","L","XL","XXL"] },
    { id: 9, name: "Duets Lover Sweater", price: 329.99, image: "sweater3.png", sizes: ["XS","S","M","L","XL","XXL"] },
    { id: 10, name: "Duets Glitch T-Shirt", price: 329.99, image: "sweater4.png", sizes: ["XS","S","M","L","XL","XXL"] }  // as per your screenshot
  ];

  const hoodies = [
    { id: 11, name: "Duets Lover Hoodie", price: 379.99, image: "hoodie1.png", sizes: ["XS","S","M","L","XL","XXL"] },
    { id: 12, name: "Duets Glitch Hoodie", price: 379.99, image: "hoodie2.png", sizes: ["XS","S","M","L","XL","XXL"] }
  ];

  const allProducts = [...tshirts, ...sweaters, ...hoodies];

  // ----- CART -----
  let cart = [];
  let currentProduct = null, selectedSize = null, selectedColor = null;

  function saveCart() {
    localStorage.setItem("mryoungfargo_cart", JSON.stringify(cart));
    updateCartUI();
  }
  function loadCart() {
    const saved = localStorage.getItem("mryoungfargo_cart");
    if (saved) cart = JSON.parse(saved);
    updateCartUI();
  }
  function updateCartUI() {
    const count = cart.reduce((s,i) => s + i.qty, 0);
    document.getElementById("cartCount").innerText = count;
    document.getElementById("stickyCartCount").innerText = count;
    const container = document.getElementById("cartItemsList");
    let total = 0;
    if (cart.length === 0) {
      container.innerHTML = "<p style='text-align:center;color:gray;'>Cart is empty</p>";
      document.getElementById("cartTotalPrice").innerText = "R0.00";
      return;
    }
    let html = "";
    cart.forEach(item => {
      const itemTotal = item.price * item.qty;
      total += itemTotal;
      html += `<div style="border-bottom:1px solid #333; padding:12px 0; display:flex; justify-content:space-between; align-items:center;">
        <div><strong>${item.name}</strong><br>Size: ${item.size}<br>Color: ${item.color}<br>R${item.price.toFixed(2)} x ${item.qty}</div>
        <button class="remove-item" data-id="${item.id}" data-size="${item.size}" data-color="${item.color}">Remove</button>
      </div>`;
    });
    container.innerHTML = html;
    document.getElementById("cartTotalPrice").innerText = `R${total.toFixed(2)}`;
    document.querySelectorAll(".remove-item").forEach(btn => {
      btn.addEventListener("click", () => {
        const id = parseInt(btn.dataset.id), size = btn.dataset.size, color = btn.dataset.color;
        cart = cart.filter(i => !(i.id === id && i.size === size && i.color === color));
        saveCart();
      });
    });
  }
  function addToCart(product, size, color) {
    if (!size) { alert("Select a size!"); return false; }
    if (!color) { alert("Select a color!"); return false; }
    const existing = cart.find(i => i.id === product.id && i.size === size && i.color === color);
    if (existing) existing.qty++;
    else cart.push({ id: product.id, name: product.name, price: product.price, size, color, qty: 1 });
    saveCart();
    document.getElementById("cartSidebar").classList.add("open");
    return true;
  }

  // ----- MODAL -----
  function showModal(product) {
    currentProduct = product;
    selectedSize = null;
    selectedColor = null;
    document.getElementById("modalProductName").innerText = product.name;
    document.getElementById("modalProductPrice").innerText = `R${product.price.toFixed(2)}`;
    const sizesDiv = document.getElementById("modalSizes");
    sizesDiv.innerHTML = "";
    product.sizes.forEach(s => {
      const btn = document.createElement("div");
      btn.className = "modal-size-btn";
      btn.innerText = s;
      btn.onclick = () => {
        document.querySelectorAll(".modal-size-btn").forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
        selectedSize = s;
      };
      sizesDiv.appendChild(btn);
    });
    const colorsDiv = document.getElementById("modalColors");
    colorsDiv.innerHTML = "";
    colors.forEach(c => {
      const btn = document.createElement("div");
      btn.className = "modal-color-btn";
      btn.style.backgroundColor = c.bg;
      btn.title = c.name;
      btn.onclick = () => {
        document.querySelectorAll(".modal-color-btn").forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
        selectedColor = c.value;
      };
      colorsDiv.appendChild(btn);
    });
    document.getElementById("sizeColorModal").classList.add("show");
  }
  function closeModal() { document.getElementById("sizeColorModal").classList.remove("show"); }
  function confirmAdd() {
    if (!selectedSize) { alert("Please select a size!"); return; }
    if (!selectedColor) { alert("Please select a color!"); return; }
    addToCart(currentProduct, selectedSize, selectedColor);
    closeModal();
  }

  // ----- RENDER GRID (3 columns) -----
  function renderGrid(products, containerId) {
    const container = document.getElementById(containerId);
    if (!container) return;
    container.innerHTML = "";
    products.forEach(prod => {
      const card = document.createElement("div");
      card.className = "product-card";
      card.innerHTML = `
        <div class="product-img">
          <img src="${prod.image}" alt="${prod.name}" onerror="this.parentElement.innerHTML='<div class=\\'no-img\\'><i class=\\'fas fa-tshirt\\'></i></div>'">
        </div>
        <div class="product-info">
          <div class="product-title">${prod.name}</div>
          <div class="product-price">R${prod.price.toFixed(2)}</div>
          <button class="add-to-cart-btn" data-id="${prod.id}"><i class="fas fa-cart-plus"></i> ADD TO CART</button>
        </div>
      `;
      container.appendChild(card);
    });
    // attach events
    container.querySelectorAll(".add-to-cart-btn").forEach(btn => {
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        const id = parseInt(btn.dataset.id);
        const product = allProducts.find(p => p.id === id);
        showModal(product);
      });
    });
    container.querySelectorAll(".product-card").forEach(card => {
      card.addEventListener("click", (e) => {
        if (e.target.classList.contains("add-to-cart-btn") || e.target.closest(".add-to-cart-btn")) return;
        const btn = card.querySelector(".add-to-cart-btn");
        if (btn) {
          const id = parseInt(btn.dataset.id);
          const product = allProducts.find(p => p.id === id);
          showModal(product);
        }
      });
    });
  }

  // ----- STICKY SCROLL -----
  window.addEventListener("scroll", () => {
    const sticky = document.getElementById("stickyNav");
    if (window.scrollY > 150) sticky.classList.add("show");
    else sticky.classList.remove("show");
  });

  // ----- NAVIGATION (smooth scroll) -----
  function setupNav() {
    const links = [
      { class: ".nav-tshirts", id: "tshirts-section" },
      { class: ".nav-sweaters", id: "sweaters-section" },
      { class: ".nav-hoodies", id: "hoodies-section" },
      { class: ".sticky-tshirts", id: "tshirts-section" },
      { class: ".sticky-sweaters", id: "sweaters-section" },
      { class: ".sticky-hoodies", id: "hoodies-section" }
    ];
    links.forEach(l => {
      document.querySelectorAll(l.class).forEach(el => {
        el.addEventListener("click", (e) => {
          e.preventDefault();
          document.getElementById(l.id).scrollIntoView({ behavior: "smooth" });
        });
      });
    });
  }

  // ----- EVENT LISTENERS -----
  document.getElementById("cartIcon")?.addEventListener("click", () => document.getElementById("cartSidebar").classList.add("open"));
  document.getElementById("stickyCartIcon")?.addEventListener("click", () => document.getElementById("cartSidebar").classList.add("open"));
  document.getElementById("closeCartBtn")?.addEventListener("click", () => document.getElementById("cartSidebar").classList.remove("open"));
  document.getElementById("checkoutBtn")?.addEventListener("click", () => {
    if (cart.length === 0) alert("Cart is empty");
    else {
      let total = cart.reduce((s,i) => s + (i.price * i.qty), 0);
      alert(`✅ Total: R${total.toFixed(2)}\nPayment options coming soon.`);
    }
  });
  document.getElementById("modalConfirmBtn")?.addEventListener("click", confirmAdd);
  document.getElementById("modalCloseBtn")?.addEventListener("click", closeModal);
  window.addEventListener("click", (e) => { if (e.target === document.getElementById("sizeColorModal")) closeModal(); });

  // ----- INIT -----
  renderGrid(tshirts, "tshirtsGrid");
  renderGrid(sweaters, "sweatersGrid");
  renderGrid(hoodies, "hoodiesGrid");
  setupNav();
  loadCart();
</script>
</body>
</html>
