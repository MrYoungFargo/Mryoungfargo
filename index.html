<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>MrYoungFargo Merch | Official Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0a0f1a 0%, #1a0a2e 50%, #2a0a4e 100%);
      color: #f0f0f0;
      line-height: 1.5;
      min-height: 100vh;
    }

    :root {
      --black: #000000;
      --red: #e11d2c;
      --green: #10b981;
      --blue: #3b82f6;
      --purple: #7f2aeb;
      --card-bg: #111111cc;
      --card-bg-solid: #111111;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .site-header {
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(127,42,235,0.3);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      padding: 15px 0;
      gap: 20px;
    }

    .logo {
      flex: 1;
      text-align: center;
    }
    .logo img {
      max-height: 140px;
      width: auto;
    }

    .nav-links {
      display: flex;
      gap: 32px;
    }
    .nav-links a {
      color: #ddd;
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .nav-links a:hover { color: var(--purple); }

    .cart-icon {
      position: relative;
      cursor: pointer;
      font-size: 1.4rem;
    }
    .cart-count {
      position: absolute;
      top: -8px;
      right: -12px;
      background: var(--red);
      color: white;
      font-size: 0.7rem;
      border-radius: 30px;
      padding: 2px 6px;
    }

    .hero {
      background: radial-gradient(circle at 20% 30%, rgba(127,42,235,0.2), rgba(0,0,0,0.8));
      padding: 50px 0;
      text-align: center;
    }
    .hero h2 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #fff, var(--purple));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .hero p {
      color: #aaa;
      margin-top: 12px;
      font-size: 0.9rem;
    }

    .category-title {
      font-size: 1.4rem;
      font-weight: 600;
      margin: 50px 0 25px 0;
      border-left: 4px solid var(--purple);
      padding-left: 16px;
    }
    .category-title i {
      margin-right: 10px;
      color: var(--purple);
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 28px;
      margin-bottom: 40px;
    }

    .product-card {
      background: var(--card-bg-solid);
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(127,42,235,0.3);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .product-card:hover {
      transform: translateY(-5px);
      border-color: var(--purple);
      box-shadow: 0 10px 25px -8px rgba(127,42,235,0.3);
    }

    .product-img {
      background: #1a1a2a;
      height: 230px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .product-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .product-img .no-img {
      font-size: 3rem;
      color: #555;
    }

    .product-info {
      padding: 18px;
    }

    .product-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 6px;
      color: white;
    }

    .product-price {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--green);
      margin: 8px 0;
    }

    .product-details {
      margin: 10px 0;
    }
    .detail-label {
      color: #888;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .size-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 8px 0;
    }
    .size-btn {
      background: #1f1f1f;
      padding: 5px 12px;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid #333;
    }
    .size-btn:hover, .size-btn.selected {
      background: var(--purple);
      border-color: var(--purple);
    }
    .color-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 8px 0;
    }
    .color-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: 0.2s;
    }
    .color-btn:hover, .color-btn.selected {
      border-color: white;
      transform: scale(1.1);
    }
    .color-red { background-color: #e11d2c; }
    .color-black { background-color: #1a1a1a; border: 1px solid #555; }
    .color-green { background-color: #10b981; }
    .color-blue { background-color: #3b82f6; }

    .add-to-cart {
      background: var(--purple);
      border: none;
      color: white;
      padding: 10px 0;
      width: 100%;
      border-radius: 40px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 0.85rem;
      transition: 0.2s;
    }
    .add-to-cart:hover {
      background: #5e1ca8;
      transform: scale(0.98);
    }

    footer {
      text-align: center;
      padding: 30px;
      border-top: 1px solid rgba(127,42,235,0.2);
      margin-top: 50px;
      font-size: 0.8rem;
    }

    @media (max-width: 768px) {
      .hero h2 { font-size: 1.5rem; }
      .header-inner { flex-direction: column; text-align: center; }
      .logo img { max-height: 100px; }
      .nav-links { justify-content: center; }
    }

    .cart-overlay {
      position: fixed;
      top: 0;
      right: -400px;
      width: 380px;
      max-width: 90vw;
      height: 100%;
      background: #0b0b1a;
      z-index: 1000;
      transition: right 0.3s;
      padding: 24px;
      border-left: 3px solid var(--purple);
      overflow-y: auto;
    }
    .cart-overlay.open { right: 0; }
    .close-cart {
      float: right;
      font-size: 1.6rem;
      cursor: pointer;
      background: none;
      border: none;
      color: white;
    }
    .cart-items { max-height: 55vh; overflow-y: auto; margin: 20px 0; }
    .cart-total { font-size: 1.3rem; font-weight: bold; border-top: 1px solid #333; padding-top: 16px; }
    .checkout-btn {
      background: var(--green);
      width: 100%;
      padding: 12px;
      border-radius: 40px;
      font-weight: bold;
      margin-top: 20px;
      border: none;
      cursor: pointer;
    }
    .remove-item {
      background: var(--red);
      border: none;
      color: white;
      padding: 5px 10px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.7rem;
    }
    .paypal-note {
      text-align: center;
      margin-top: 12px;
      font-size: 0.7rem;
      color: #666;
    }
  </style>
</head>
<body>

<div class="site-header">
  <div class="container header-inner">
    <div class="logo">
      <img src="fargo1.png" alt="MrYoungFargo" onerror="this.src='https://placehold.co/600x600?text=MrYoungFargo'">
    </div>
    <div class="nav-links">
      <a href="#" class="nav-tshirts">T-SHIRTS</a>
      <a href="#" class="nav-sweaters">SWEATERS</a>
      <a href="#" class="nav-hoodies">HOODIES</a>
    </div>
    <div class="cart-icon" id="cartIcon">
      <i class="fas fa-bag-shopping"></i>
      <span class="cart-count" id="cartCount">0</span>
    </div>
  </div>
</div>

<section class="hero">
  <div class="container">
    <h2>MRYOUNGFARGO MERCH</h2>
    <p>Premium quality • Streetwear essentials</p>
  </div>
</section>

<div class="container">
  <div id="tshirts-section">
    <div class="category-title"><i class="fas fa-tshirt"></i> T-SHIRTS</div>
    <div class="products-grid" id="tshirtsGrid"></div>
  </div>

  <div id="sweaters-section">
    <div class="category-title"><i class="fas fa-vest"></i> SWEATERS</div>
    <div class="products-grid" id="sweatersGrid"></div>
  </div>

  <div id="hoodies-section">
    <div class="category-title"><i class="fas fa-hoodie"></i> HOODIES</div>
    <div class="products-grid" id="hoodiesGrid"></div>
  </div>
</div>

<footer>
  <p>© 2025 MrYoungFargo — All Rights Reserved</p>
</footer>

<div id="cartSidebar" class="cart-overlay">
  <button class="close-cart" id="closeCartBtn">&times;</button>
  <h2><i class="fas fa-shopping-cart"></i> CART</h2>
  <div id="cartItemsList" class="cart-items"></div>
  <div class="cart-total" id="cartTotalPrice">R0.00</div>
  <button class="checkout-btn" id="checkoutBtn">PROCEED TO CHECKOUT →</button>
  <div class="paypal-note">Payment options available at checkout</div>
</div>

<script>
  // Colors available for all products
  const availableColors = [
    { name: "Red", class: "color-red", value: "Red" },
    { name: "Black", class: "color-black", value: "Black" },
    { name: "Green", class: "color-green", value: "Green" },
    { name: "Blue", class: "color-blue", value: "Blue" }
  ];

  // T-SHIRTS
  const tshirts = [
    { id: 1, name: "Neon Duets T-Shirt", price: 179.99, image: "t-shirt1.png", type: "T-Shirt", sizes: ["XS","S","M","L","XL","XXL"] },
    { id: 2, name: "Duets Lover T-Shirt", price: 179.99, image: "t-shirt2.png", type: "T-Shirt", sizes: ["XS","S","M","L","XL","XXL"] },
    { id: 3, name: "Duets Glitch T-Shirt", price: 179.99, image: "t-shirt3.png", type: "T-Shirt", sizes: ["XS","S","M","L","XL","XXL"] },
    { id: 4, name: "Sbabaring T-Shirt", price: 179.99, image: "t-shirt4.png", type: "T-Shirt", sizes: ["XS","S","M","L","XL","XXL"] },
    { id: 5, name: "Monalisa Sbabaring T-Shirt", price: 179.99, image: "t-shirt5.png", type: "T-Shirt", sizes: ["XS","S","M","L","XL","XXL"] }
  ];

  // SWEATERS - Fixed sweater1 name to "Sbabaring Sweater"
  const sweaters = [
    { id: 6, name: "Sbabaring Sweater", price: 329.99, image: "sweater1.png", type: "Sweater", sizes: ["XS","S","M","L","XL","XXL"] },
    { id: 7, name: "Neon Duets Sweater", price: 329.99, image: "sweater2.png", type: "Sweater", sizes: ["XS","S","M","L","XL","XXL"] },
    { id: 8, name: "Duets Lover Sweater", price: 329.99, image: "sweater3.png", type: "Sweater", sizes: ["XS","S","M","L","XL","XXL"] },
    { id: 9, name: "Duets Glitch Sweater", price: 329.99, image: "sweater4.png", type: "Sweater", sizes: ["XS","S","M","L","XL","XXL"] }
  ];

  // HOODIES
  const hoodies = [
    { id: 10, name: "Duets Lover Hoodie", price: 379.99, image: "hoodie1.png", type: "Hoodie", sizes: ["XS","S","M","L","XL","XXL"] },
    { id: 11, name: "Duets Glitch Hoodie", price: 379.99, image: "hoodie2.png", type: "Hoodie", sizes: ["XS","S","M","L","XL","XXL"] }
  ];

  const allProducts = [...tshirts, ...sweaters, ...hoodies];

  let cart = [];

  function saveCart() {
    localStorage.setItem("mryoungfargo_cart", JSON.stringify(cart));
    updateCartUI();
  }

  function loadCart() {
    const saved = localStorage.getItem("mryoungfargo_cart");
    if (saved) cart = JSON.parse(saved);
    updateCartUI();
  }

  function updateCartUI() {
    const count = cart.reduce((s, i) => s + i.qty, 0);
    document.getElementById("cartCount").innerText = count;
    const container = document.getElementById("cartItemsList");
    let total = 0;
    if (cart.length === 0) {
      container.innerHTML = "<p style='text-align:center;color:gray;'>Cart is empty</p>";
      document.getElementById("cartTotalPrice").innerText = "R0.00";
      return;
    }
    let html = "";
    cart.forEach((item) => {
      const itemTotal = item.price * item.qty;
      total += itemTotal;
      html += `<div style="border-bottom:1px solid #333; padding:12px 0; display:flex; justify-content:space-between; align-items:center;">
        <div><strong>${item.name}</strong><br>Size: ${item.size}<br>Color: ${item.color}<br>R${item.price.toFixed(2)} x ${item.qty}</div>
        <button class="remove-item" data-id="${item.id}" data-size="${item.size}" data-color="${item.color}" style="background:var(--red); border:none; color:white; padding:5px 10px; border-radius:20px;">Remove</button>
      </div>`;
    });
    container.innerHTML = html;
    document.getElementById("cartTotalPrice").innerText = `R${total.toFixed(2)}`;
    document.querySelectorAll(".remove-item").forEach(btn => {
      btn.addEventListener("click", () => {
        const id = parseInt(btn.dataset.id);
        const size = btn.dataset.size;
        const color = btn.dataset.color;
        cart = cart.filter(i => !(i.id === id && i.size === size && i.color === color));
        saveCart();
      });
    });
  }

  function addToCart(product, size, color) {
    if (!size) { alert("Please select a size!"); return false; }
    if (!color) { alert("Please select a color!"); return false; }
    const existing = cart.find(i => i.id === product.id && i.size === size && i.color === color);
    if (existing) existing.qty++;
    else cart.push({ id: product.id, name: product.name, price: product.price, size: size, color: color, qty: 1 });
    saveCart();
    document.getElementById("cartSidebar").classList.add("open");
    return true;
  }

  function renderProductGrid(productsArray, containerId) {
    const container = document.getElementById(containerId);
    if (!container) return;
    container.innerHTML = "";
    productsArray.forEach(prod => {
      const card = document.createElement("div");
      card.className = "product-card";
      card.innerHTML = `
        <div class="product-img">
          <img src="${prod.image}" alt="${prod.name}" onerror="this.parentElement.innerHTML='<div class=\\'no-img\\'><i class=\\'fas fa-tshirt\\'></i></div>'">
        </div>
        <div class="product-info">
          <div class="product-title">${prod.name}</div>
          <div class="product-price">R${prod.price.toFixed(2)}</div>
          <div class="product-details">
            <div class="detail-label">AVAILABLE SIZES</div>
            <div class="size-row" data-id="${prod.id}">
              ${prod.sizes.map(s => `<span class="size-btn" data-size="${s}">${s}</span>`).join('')}
            </div>
            <div class="detail-label">AVAILABLE COLORS</div>
            <div class="color-row" data-color-for="${prod.id}">
              ${availableColors.map(color => `<div class="color-btn ${color.class}" data-color="${color.value}" title="${color.name}"></div>`).join('')}
            </div>
          </div>
          <button class="add-to-cart" data-id="${prod.id}"><i class="fas fa-cart-plus"></i> ADD TO CART</button>
        </div>
      `;
      container.appendChild(card);
    });

    // Add size selection listeners
    container.querySelectorAll(".size-btn").forEach(btn => {
      btn.addEventListener("click", (e) => {
        const parent = btn.closest(".size-row");
        parent.querySelectorAll(".size-btn").forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
      });
    });
    
    // Add color selection listeners
    container.querySelectorAll(".color-btn").forEach(btn => {
      btn.addEventListener("click", (e) => {
        const parent = btn.closest(".color-row");
        parent.querySelectorAll(".color-btn").forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
      });
    });
    
    // Add add-to-cart listeners
    container.querySelectorAll(".add-to-cart").forEach(btn => {
      btn.addEventListener("click", (e) => {
        const id = parseInt(btn.dataset.id);
        const product = allProducts.find(p => p.id === id);
        const productCard = btn.closest(".product-card");
        const sizeRow = productCard.querySelector(".size-row");
        const colorRow = productCard.querySelector(".color-row");
        const selectedSize = sizeRow ? sizeRow.querySelector(".size-btn.selected") : null;
        const selectedColor = colorRow ? colorRow.querySelector(".color-btn.selected") : null;
        const size = selectedSize ? selectedSize.dataset.size : null;
        const color = selectedColor ? selectedColor.dataset.color : null;
        addToCart(product, size, color);
      });
    });
  }

  // Navigation scroll
  document.querySelector(".nav-tshirts")?.addEventListener("click", (e) => {
    e.preventDefault();
    document.getElementById("tshirts-section").scrollIntoView({ behavior: "smooth" });
  });
  document.querySelector(".nav-sweaters")?.addEventListener("click", (e) => {
    e.preventDefault();
    document.getElementById("sweaters-section").scrollIntoView({ behavior: "smooth" });
  });
  document.querySelector(".nav-hoodies")?.addEventListener("click", (e) => {
    e.preventDefault();
    document.getElementById("hoodies-section").scrollIntoView({ behavior: "smooth" });
  });

  document.getElementById("cartIcon")?.addEventListener("click", () => document.getElementById("cartSidebar").classList.add("open"));
  document.getElementById("closeCartBtn")?.addEventListener("click", () => document.getElementById("cartSidebar").classList.remove("open"));
  document.getElementById("checkoutBtn")?.addEventListener("click", () => {
    if (cart.length === 0) alert("Your cart is empty!");
    else {
      let total = cart.reduce((sum, i) => sum + (i.price * i.qty), 0);
      alert(`✅ Checkout Total: R${total.toFixed(2)}\n\nPayment options available. Contact us for bank transfer or PayFast.`);
    }
  });

  // Render all sections
  renderProductGrid(tshirts, "tshirtsGrid");
  renderProductGrid(sweaters, "sweatersGrid");
  renderProductGrid(hoodies, "hoodiesGrid");
  loadCart();
</script>
</body>
</html>
