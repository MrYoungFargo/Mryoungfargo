<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>MrYoungFargo Merch | Curved Flow Background</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', sans-serif;
      color: #e0e0e0;
      line-height: 1.2;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* CANVAS BACKGROUND – flowing curved lines (no straight lines) */
    #bg-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 0;
      pointer-events: none;
    }

    /* ALL CONTENT goes above the canvas */
    .site-header, .hero, .container, footer, .cart-overlay, .modal {
      position: relative;
      z-index: 10;
    }

    :root { --purple: #7f2aeb; --green: #10b981; --red: #e11d2c; --blue: #3b82f6; }
    .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }

    /* header gradient (kept as is) */
    .site-header {
      background: linear-gradient(135deg, #000000, #0a2a5a, #000000, #0a2a5a);
      background-size: 300% 300%;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      animation: headerGradient 4s ease infinite;
    }
    @keyframes headerGradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      padding: 8px 0;
      gap: 10px;
    }
    .logo { flex: 1; text-align: center; }
    .logo img {
      max-height: 70px;
      width: auto;
      animation: spin3D 10s ease-in-out infinite;
      transform-style: preserve-3d;
      perspective: 1000px;
    }
    @keyframes spin3D {
      0% { transform: rotateY(0deg); }
      50% { transform: rotateY(180deg); }
      100% { transform: rotateY(360deg); }
    }

    /* sticky nav */
    .sticky-nav {
      position: fixed;
      top: -50px;
      left: 0;
      width: 100%;
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding: 4px 20px;
      z-index: 1000;
      transition: top 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 30px;
    }
    .sticky-nav.show { top: 0; }
    .sticky-nav a { color: #ccc; text-decoration: none; font-weight: 500; font-size: 0.6rem; }
    .sticky-nav a:hover { color: white; }
    .sticky-cart { position: relative; cursor: pointer; font-size: 0.9rem; color: white; margin-left: auto; }
    .sticky-cart .cart-count-sticky {
      position: absolute; top: -5px; right: -8px;
      background: var(--red); font-size: 0.45rem; padding: 1px 3px; border-radius: 20px;
    }
    .sticky-nav-links { display: flex; gap: 30px; }

    .nav-links { display: flex; gap: 20px; }
    .nav-links a { color: #ccc; text-decoration: none; font-weight: 500; font-size: 0.6rem; }
    .nav-links a:hover { color: white; }
    .cart-icon { position: relative; cursor: pointer; font-size: 0.9rem; }
    .cart-count {
      position: absolute; top: -5px; right: -8px;
      background: var(--red); font-size: 0.45rem; padding: 1px 3px; border-radius: 20px;
    }
    .hero { padding: 15px 0 8px; text-align: center; }
    .hero h2 { font-size: 0.85rem; font-weight: 700; color: white; text-shadow: 0 0 5px rgba(0,0,0,0.3); }
    .hero p { color: rgba(255,255,255,0.7); font-size: 0.5rem; margin-top: 3px; }
    .category-title { font-size: 0.7rem; font-weight: 700; margin: 20px 0 10px 0; border-left: 3px solid white; padding-left: 8px; color: white; }
    .category-title i { margin-right: 5px; color: white; font-size: 0.65rem; }

    /* 3‑column grid */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 30px;
    }
    @media (max-width: 700px) { .products-grid { gap: 12px; } }

    /* product card – black to dark blue gradient */
    .product-card {
      background: linear-gradient(135deg, #0a0a1a, #0f1a2e);
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.2s ease;
      cursor: pointer;
    }
    .product-card:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.3); box-shadow: 0 3px 8px rgba(0,0,0,0.4); }

    .product-img { background: #0a0a1a; height: 100px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .product-img img { width: 100%; height: 100%; object-fit: cover; }
    .no-img { font-size: 1rem; color: #888; }

    .product-info { padding: 8px 8px 10px; }
    .product-title {
      font-size: 0.55rem;
      font-weight: 700;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: white;
    }
    .product-price { font-size: 0.65rem; font-weight: 800; color: var(--green); margin: 3px 0; }
    
    /* BUTTON STYLES – matching the "Experience flow" button from the example */
    .add-to-cart-btn {
      background: rgba(45, 85, 140, 0.55);
      border: 1px solid rgba(100, 170, 250, 0.6);
      color: white;
      padding: 4px 0;
      width: 100%;
      border-radius: 44px;
      font-weight: 500;
      font-size: 0.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      white-space: nowrap;
      transition: all 0.25s;
      backdrop-filter: blur(4px);
    }
    .add-to-cart-btn:hover {
      background: rgba(65, 115, 185, 0.7);
      border-color: rgba(120, 195, 255, 0.85);
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(0, 40, 80, 0.3);
    }

    footer { text-align: center; padding: 15px; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 20px; font-size: 0.5rem; color: rgba(255,255,255,0.6); }

    /* cart sidebar */
    .cart-overlay {
      position: fixed; top: 0; right: -320px; width: 280px; max-width: 80vw; height: 100%;
      background: #0b0b12; z-index: 1001; transition: right 0.3s; padding: 12px;
      border-left: 2px solid #4a1d96; overflow-y: auto;
    }
    .cart-overlay.open { right: 0; }
    .close-cart { float: right; font-size: 1rem; cursor: pointer; background: none; border: none; color: white; }
    .cart-items { max-height: 55vh; overflow-y: auto; margin: 8px 0; font-size: 0.6rem; }
    .cart-total { font-size: 0.75rem; font-weight: bold; border-top: 1px solid #333; padding-top: 6px; }
    .checkout-btn {
      background: rgba(45, 85, 140, 0.55);
      border: 1px solid rgba(100, 170, 250, 0.6);
      width: 100%;
      padding: 5px;
      border-radius: 44px;
      font-weight: 500;
      margin-top: 8px;
      border: none;
      cursor: pointer;
      font-size: 0.6rem;
      color: white;
      transition: all 0.25s;
    }
    .checkout-btn:hover {
      background: rgba(65, 115, 185, 0.7);
      border-color: rgba(120, 195, 255, 0.85);
      transform: translateY(-1px);
    }
    .remove-item { background: var(--red); border: none; color: white; padding: 2px 5px; border-radius: 20px; font-size: 0.5rem; cursor: pointer; }

    /* modal */
    .modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center;
    }
    .modal.show { display: flex; }
    .modal-content {
      background: white; border-radius: 14px; width: 85%; max-width: 260px; padding: 12px; text-align: center;
    }
    .modal-content h3 { font-size: 0.8rem; color: #111; margin-bottom: 2px; }
    .modal-price { font-size: 0.7rem; color: #10b981; font-weight: 800; margin-bottom: 6px; }
    .modal-section-title { font-size: 0.5rem; text-align: left; margin: 6px 0 3px; color: #555; }
    .modal-sizes, .modal-colors { display: flex; gap: 4px; flex-wrap: wrap; justify-content: center; }
    .modal-size-btn {
      background: #f0f0f0; padding: 3px 7px; border-radius: 30px; font-size: 0.6rem; font-weight: 600; cursor: pointer;
    }
    .modal-size-btn.selected, .modal-size-btn:hover { background: #4a1d96; color: white; }
    .modal-color-btn { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
    .modal-color-btn.selected, .modal-color-btn:hover { border-color: #4a1d96; transform: scale(1.05); }
    .modal-confirm {
      background: rgba(45, 85, 140, 0.55);
      border: 1px solid rgba(100, 170, 250, 0.6);
      color: white;
      padding: 5px 0;
      width: 100%;
      border-radius: 44px;
      font-weight: 500;
      margin-top: 8px;
      cursor: pointer;
      font-size: 0.65rem;
      transition: all 0.25s;
    }
    .modal-confirm:hover {
      background: rgba(65, 115, 185, 0.7);
      border-color: rgba(120, 195, 255, 0.85);
    }
    .modal-close { background: none; border: none; color: #999; margin-top: 5px; cursor: pointer; font-size: 0.55rem; }
  </style>
</head>
<body>

<!-- CANVAS BACKGROUND (flowing curved lines, no straight lines) -->
<canvas id="bg-canvas"></canvas>

<!-- Modal -->
<div id="sizeColorModal" class="modal">
  <div class="modal-content">
    <h3 id="modalProductName">Product</h3>
    <div class="modal-price" id="modalProductPrice">R0.00</div>
    <div class="modal-section-title">SIZE</div>

  </div>
</div>

<div class="sticky-nav" id="stickyNav">

    <a href="#" class="sticky-sweaters">SWEATERS</a>
    <a href="#" class="sticky-hoodies">HOODIES</a>
  </div>
  <div class="sticky-cart" id="stickyCartIcon">

    <span class="cart-count-sticky" id="stickyCartCount">0</span>

</div>

<!-- Main Header -->
<div class="site-header">
  <div class="container header-inner">
    <div class="logo"><img src="fargo1.png" alt="MrYoungFargo" onerror="this.src='https://placehold.co/250x70?text=MrYoungFargo'"></div>
    <div class="nav-links">
      <a href="#" class="nav-tshirts">T-SHIRTS</a>
      <a href="#" class="nav-sweaters">SWEATERS</a>
      <a href="#" class="nav-hoodies">HOODIES</a>
    </div>
    <div class="cart-icon" id="cartIcon"><i class="fas fa-bag-shopping"></i><span class="cart-count" id="cartCount">0</span></div>
  </div>
</div>

<section class="hero"><div class="container"><h2>MRYOUNGFARGO MERCH</h2><p>Premium quality • Streetwear essentials</p></div></section>

<div class="container">
  <div id="tshirts-section"><div class="category-title"><i class="fas fa-tshirt"></i> T-SHIRTS</div><div class="products-grid" id="tshirtsGrid"></div></div>
  <div id="sweaters-section"><div class="category-title"><i class="fas fa-vest"></i> SWEATERS</div><div class="products-grid" id="sweatersGrid"></div></div>
  <div id="hoodies-section"><div class="category-title"><i class="fas fa-hoodie"></i> HOODIES</div><div class="products-grid" id="hoodiesGrid"></div></div>
</div>

<footer><p>© 2025 MrYoungFargo — All Rights Reserved</p></footer>

<div id="cartSidebar" class="cart-overlay">
  <button class="close-cart" id="closeCartBtn">&times;</button>
  <h2><i class="fas fa-shopping-cart"></i> CART</h2>
  <div id="cartItemsList" class="cart-items"></div>
  <div class="cart-total" id="cartTotalPrice">R0.00</div>
  <button class="checkout-btn" id="checkoutBtn">CHECKOUT →</button>
</div>

<script>
  // CANVAS BACKGROUND ANIMATION (flowing curved lines, no straight lines)
  (function() {
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    let time = 0;
    let mouseX = 0.5, mouseY = 0.5;
    let mousePresent = false;
    
    class OrganicWave {
      constructor(baseYratio, amplitude, freqX, freqTime, colorHue, lineWidth, phaseOffset) {
        this.baseYratio = baseYratio;
        this.amplitude = amplitude;
        this.freqX = freqX;
        this.freqTime = freqTime;
        this.colorHue = colorHue;
        this.lineWidth = lineWidth;
        this.phaseOffset = phaseOffset || 0;
      }
      draw(ctx, w, h, t) {
        ctx.beginPath();
        const timePhase = t * this.freqTime + this.phaseOffset;
        const baseY = this.baseYratio * h;
        let first = true;
        for (let x = 0; x <= w; x += 12) {
          const yOffset = Math.sin(x * this.freqX + timePhase) * this.amplitude
                       + Math.cos(x * this.freqX * 0.53 + timePhase * 0.7) * (this.amplitude * 0.4);
          const y = baseY + yOffset;
          if (first) { ctx.moveTo(x, y); first = false; }
          else { ctx.lineTo(x, y); }
        }
        ctx.strokeStyle = `hsla(${this.colorHue}, 70%, 70%, 0.28)`;
        ctx.lineWidth = this.lineWidth;
        ctx.stroke();
      }
    }
    
    class DriftingBezier {
      constructor(startRatioX, startRatioY, endRatioX, endRatioY, controlFactor, speed, colorHue, width) {
        this.sx = startRatioX; this.sy = startRatioY; this.ex = endRatioX; this.ey = endRatioY;
        this.ctrlFactor = controlFactor; this.speed = speed; this.colorHue = colorHue; this.width = width;
        this.phase = Math.random() * Math.PI * 2;
      }
      draw(ctx, w, h, t) {
        const startX = this.sx * w;
        const startY = this.sy * h + Math.sin(t * this.speed * 0.6 + this.phase) * 12;
        const endX = this.ex * w;
        const endY = this.ey * h + Math.cos(t * this.speed * 0.5 + this.phase) * 10;
        const ctrl1X = startX + (endX - startX) * 0.3 + Math.sin(t * this.speed + this.phase) * this.ctrlFactor;
        const ctrl1Y = startY + (endY - startY) * 0.2 + Math.cos(t * this.speed * 0.8) * (this.ctrlFactor * 0.7);
        const ctrl2X = startX + (endX - startX) * 0.7 + Math.cos(t * this.speed * 0.9 + 1.2) * this.ctrlFactor;
        const ctrl2Y = startY + (endY - startY) * 0.6 + Math.sin(t * this.speed * 0.7) * (this.ctrlFactor * 0.8);
        ctx.beginPath();
        ctx.moveTo(startX, startY);
        ctx.bezierCurveTo(ctrl1X, ctrl1Y, ctrl2X, ctrl2Y, endX, endY);
        ctx.strokeStyle = `hsla(${this.colorHue}, 65%, 72%, 0.22)`;
        ctx.lineWidth = this.width;
        ctx.stroke();
      }
    }
    
    class RadialCurveRing {
      constructor(centerXRatio, centerYRatio, radiusGrowth, speed, colorHue, maxRadiusFactor) {
        this.cx = centerXRatio; this.cy = centerYRatio; this.growth = radiusGrowth;
        this.speed = speed; this.colorHue = colorHue; this.maxFactor = maxRadiusFactor;
        this.phaseShift = Math.random() * 100;
      }
      draw(ctx, w, h, t) {
        const centerX = this.cx * w; const centerY = this.cy * h;
        const animatedRadius = (t * this.growth + this.phaseShift) % (Math.min(w, h) * this.maxFactor);
        const pulse = Math.sin(t * this.speed) * 8;
        const radius = Math.max(15, animatedRadius + pulse);
        if (radius > Math.min(w, h) * 0.9) return;
        ctx.beginPath();
        ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
        ctx.strokeStyle = `hsla(${this.colorHue}, 70%, 68%, 0.2)`;
        ctx.lineWidth = 1.3;
        ctx.stroke();
        if (radius > 30) {
          ctx.beginPath();
          ctx.arc(centerX, centerY, radius - 9, 0, Math.PI * 2);
          ctx.strokeStyle = `hsla(${this.colorHue + 20}, 65%, 72%, 0.12)`;
          ctx.stroke();
        }
      }
    }
    
    const organicWaves = [];
    const bezierFlows = [];
    const radialRings = [];
    
    function initElements() {
      organicWaves.length = 0;
      bezierFlows.length = 0;
      radialRings.length = 0;
      organicWaves.push(new OrganicWave(0.2, 32, 0.0032, 0.0017, 205, 1.4, 0));
      organicWaves.push(new OrganicWave(0.45, 45, 0.0025, 0.0012, 225, 1.6, 1.2));
      organicWaves.push(new OrganicWave(0.65, 38, 0.0038, 0.0021, 190, 1.3, 2.5));
      organicWaves.push(new OrganicWave(0.8, 28, 0.0045, 0.0014, 215, 1.2, 0.8));
      organicWaves.push(new OrganicWave(0.33, 25, 0.0050, 0.0019, 235, 1.0, 3.0));
      organicWaves.push(new OrganicWave(0.72, 35, 0.0030, 0.0011, 200, 1.1, 1.7));
      bezierFlows.push(new DriftingBezier(0.1, 0.3, 0.85, 0.6, 45, 0.0022, 210, 1.3));
      bezierFlows.push(new DriftingBezier(0.2, 0.7, 0.9, 0.35, 55, 0.0018, 195, 1.2));
      bezierFlows.push(new DriftingBezier(0.05, 0.5, 0.7, 0.85, 38, 0.0026, 230, 1.4));
      bezierFlows.push(new DriftingBezier(0.4, 0.15, 0.95, 0.55, 48, 0.0020, 220, 1.1));
      bezierFlows.push(new DriftingBezier(0.6, 0.9, 0.15, 0.4, 42, 0.0024, 205, 1.2));
      radialRings.push(new RadialCurveRing(0.25, 0.5, 0.9, 0.018, 210, 0.9));
      radialRings.push(new RadialCurveRing(0.7, 0.4, 0.7, 0.022, 225, 0.85));
      radialRings.push(new RadialCurveRing(0.5, 0.75, 1.1, 0.015, 195, 0.95));
      radialRings.push(new RadialCurveRing(0.82, 0.6, 0.6, 0.025, 240, 0.8));
      radialRings.push(new RadialCurveRing(0.35, 0.2, 0.8, 0.020, 215, 0.88));
    }
    
    function drawBackground(ctx, w, h, t) {
      const grad = ctx.createLinearGradient(0, 0, w * 0.4, h);
      grad.addColorStop(0, '#0A111F');
      grad.addColorStop(0.6, '#111A29');
      grad.addColorStop(1, '#060C18');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);
      for (let i = 0; i < 4; i++) {
        const cx = w * (0.2 + Math.sin(t * 0.0003 + i) * 0.2);
        const cy = h * (0.5 + Math.cos(t * 0.00025 + i * 1.2) * 0.2);
        const rad = Math.min(w, h) * 0.4;
        const radGrad = ctx.createRadialGradient(cx, cy, 10, cx, cy, rad);
        radGrad.addColorStop(0, `rgba(65, 125, 195, 0.045)`);
        radGrad.addColorStop(1, `rgba(20, 50, 90, 0)`);
        ctx.fillStyle = radGrad;
        ctx.fillRect(0, 0, w, h);
      }
      for (let wave of organicWaves) wave.draw(ctx, w, h, t);
      for (let bez of bezierFlows) bez.draw(ctx, w, h, t);
      for (let ring of radialRings) ring.draw(ctx, w, h, t);
      ctx.lineWidth = 0.8;
      for (let i = 0; i < 25; i++) {
        const angle = t * 0.0008 + i;
        const x1 = w * (0.3 + Math.sin(angle) * 0.2);
        const y1 = h * (0.4 + Math.cos(angle * 1.3) * 0.2);
        const x2 = w * (0.7 + Math.cos(angle) * 0.18);
        const y2 = h * (0.6 + Math.sin(angle * 0.9) * 0.22);
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.quadraticCurveTo(w * 0.5 + Math.sin(t*0.002)*15, h * 0.5 + Math.cos(t*0.0018)*12, x2, y2);
        ctx.strokeStyle = `hsla(${200 + i * 3}, 65%, 70%, 0.12)`;
        ctx.stroke();
      }
      if (mousePresent) {
        ctx.beginPath();
        ctx.ellipse(mouseX * w, mouseY * h, 28, 22, t * 0.02, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(100, 180, 250, 0.25)`;
        ctx.lineWidth = 1.1;
        ctx.stroke();
        ctx.beginPath();
        ctx.ellipse(mouseX * w, mouseY * h, 44, 36, -t * 0.015, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(140, 200, 255, 0.2)`;
        ctx.stroke();
      }
    }
    
    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
      initElements();
    }
    
    function animate() {
      if (!ctx) return;
      time = (time + 1) % 36000;
      drawBackground(ctx, width, height, time);
      requestAnimationFrame(animate);
    }
    
    window.addEventListener('resize', resize);
    window.addEventListener('mousemove', (e) => {
      mouseX = e.clientX / width;
      mouseY = e.clientY / height;
      mousePresent = true;
      setTimeout(() => { mousePresent = true; }, 20);
    });
    window.addEventListener('mouseleave', () => { mousePresent = false; });
    resize();
    animate();
  })();

  // STORE JAVASCRIPT (unchanged)
  const colors = [
    { name: "Red", value: "Red", bg: "#e11d2c" },
    { name: "Black", value: "Black", bg: "#1a1a1a" },
    { name: "Green", value: "Green", bg: "#10b981" },
    { name: "Blue", value: "Blue", bg: "#3b82f6" }
  ];

  const tshirts = [
    { id: 1, name: "Neon Duets T-Shirt", price: 179.99, image: "t-shirt1.png", sizes: ["XS","S","M","L","XL","XXL"] },
    { id: 2, name: "Duets Lover T-Shirt", price: 179.99, image: "t-shirt2.png", sizes: ["XS","S","M","L","XL","XXL"] },
    { id: 3, name: "Duets Glitch T-Shirt", price: 179.99, image: "t-shirt3.png", sizes: ["XS","S","M","L","XL","XXL"] },
    { id: 4, name: "Sabaring T-Shirt", price: 179.99, image: "t-shirt4.png", sizes: ["XS","S","M","L","XL","XXL"] },
    { id: 5, name: "Monalisa Sabaring T-Shirt", price: 179.99, image: "t-shirt5.png", sizes: ["XS","S","M","L","XL","XXL"] }
  ];

  const sweaters = [
    { id: 6, name: "Sabaring Sweater", price: 329.99, image: "sweater1.png", sizes: ["XS","S","M","L","XL","XXL"] },
    { id: 7, name: "Neon Duets Sweater", price: 329.99, image: "sweater2.png", sizes: ["XS","S","M","L","XL","XXL"] },
    { id: 8, name: "Duets Lover Sweater", price: 329.99, image: "sweater3.png", sizes: ["XS","S","M","L","XL","XXL"] },
    { id: 9, name: "Duets Glitch T-Shirt", price: 329.99, image: "sweater4.png", sizes: ["XS","S","M","L","XL","XXL"] }
  ];

  const hoodies = [
    { id: 10, name: "Duets Lover Hoodie", price: 379.99, image: "hoodie1.png", sizes: ["XS","S","M","L","XL","XXL"] },
    { id: 11, name: "Duets Glitch Hoodie", price: 379.99, image: "hoodie2.png", sizes: ["XS","S","M","L","XL","XXL"] }
  ];

  const allProducts = [...tshirts, ...sweaters, ...hoodies];
  let cart = [];
  let currentProduct = null, selectedSize = null, selectedColor = null;

  function saveCart() { localStorage.setItem("mryoungfargo_cart", JSON.stringify(cart)); updateCartUI(); }
  function loadCart() { const saved = localStorage.getItem("mryoungfargo_cart"); if (saved) cart = JSON.parse(saved); updateCartUI(); }
  function updateCartUI() {
    const count = cart.reduce((s,i) => s + i.qty, 0);
    document.getElementById("cartCount").innerText = count;
    document.getElementById("stickyCartCount").innerText = count;
    const container = document.getElementById("cartItemsList");
    let total = 0;
    if (cart.length === 0) { container.innerHTML = "<p style='text-align:center;color:gray;'>Cart empty</p>"; document.getElementById("cartTotalPrice").innerText = "R0.00"; return; }
    let html = "";
    cart.forEach(item => {
      const itemTotal = item.price * item.qty;
      total += itemTotal;
      html += `<div style="border-bottom:1px solid #333; padding:6px 0; display:flex; justify-content:space-between;"><div><strong>${item.name}</strong><br>${item.size} / ${item.color}<br>R${item.price.toFixed(2)} x ${item.qty}</div><button class="remove-item" data-id="${item.id}" data-size="${item.size}" data-color="${item.color}">Remove</button></div>`;
    });
    container.innerHTML = html;
    document.getElementById("cartTotalPrice").innerText = `R${total.toFixed(2)}`;
    document.querySelectorAll(".remove-item").forEach(btn => {
      btn.addEventListener("click", () => {
        const id = parseInt(btn.dataset.id), size = btn.dataset.size, color = btn.dataset.color;
        cart = cart.filter(i => !(i.id === id && i.size === size && i.color === color));
        saveCart();
      });
    });
  }
  function addToCart(product, size, color) {
    if (!size) { alert("Select size"); return; }
    if (!color) { alert("Select color"); return; }
    const existing = cart.find(i => i.id === product.id && i.size === size && i.color === color);
    if (existing) existing.qty++;
    else cart.push({ id: product.id, name: product.name, price: product.price, size, color, qty: 1 });
    saveCart();
    document.getElementById("cartSidebar").classList.add("open");
  }
  function showModal(product) {
    currentProduct = product; selectedSize = selectedColor = null;
    document.getElementById("modalProductName").innerText = product.name;
    document.getElementById("modalProductPrice").innerText = `R${product.price.toFixed(2)}`;
    const sizesDiv = document.getElementById("modalSizes");
    sizesDiv.innerHTML = "";
    product.sizes.forEach(s => {
      const btn = document.createElement("div"); btn.className = "modal-size-btn"; btn.innerText = s;
      btn.onclick = () => { document.querySelectorAll(".modal-size-btn").forEach(b => b.classList.remove("selected")); btn.classList.add("selected"); selectedSize = s; };
      sizesDiv.appendChild(btn);
    });
    const colorsDiv = document.getElementById("modalColors");
    colorsDiv.innerHTML = "";
    colors.forEach(c => {
      const btn = document.createElement("div"); btn.className = "modal-color-btn"; btn.style.backgroundColor = c.bg; btn.title = c.name;
      btn.onclick = () => { document.querySelectorAll(".modal-color-btn").forEach(b => b.classList.remove("selected")); btn.classList.add("selected"); selectedColor = c.value; };
      colorsDiv.appendChild(btn);
    });
    document.getElementById("sizeColorModal").classList.add("show");
  }
  function closeModal() { document.getElementById("sizeColorModal").classList.remove("show"); }
  function confirmAdd() { if (!selectedSize) { alert("Select size"); return; } if (!selectedColor) { alert("Select color"); return; } addToCart(currentProduct, selectedSize, selectedColor); closeModal(); }

  function renderGrid(products, containerId) {
    const container = document.getElementById(containerId);
    if (!container) return;
    container.innerHTML = "";
    products.forEach(prod => {
      const card = document.createElement("div"); card.className = "product-card";
      card.innerHTML = `<div class="product-img"><img src="${prod.image}" alt="${prod.name}" onerror="this.parentElement.innerHTML='<div class=\\'no-img\\'><i class=\\'fas fa-tshirt\\'></i></div>'"></div><div class="product-info"><div class="product-title">${prod.name}</div><div class="product-price">R${prod.price.toFixed(2)}</div><button class="add-to-cart-btn" data-id="${prod.id}"><i class="fas fa-cart-plus"></i> ADD TO CART</button></div>`;
      container.appendChild(card);
    });
    container.querySelectorAll(".add-to-cart-btn").forEach(btn => {
      btn.addEventListener("click", (e) => { e.stopPropagation(); const id = parseInt(btn.dataset.id); const product = allProducts.find(p => p.id === id); showModal(product); });
    });
    container.querySelectorAll(".product-card").forEach(card => {
      card.addEventListener("click", (e) => { if (e.target.closest(".add-to-cart-btn")) return; const btn = card.querySelector(".add-to-cart-btn"); if (btn) { const id = parseInt(btn.dataset.id); const product = allProducts.find(p => p.id === id); showModal(product); } });
    });
  }

  window.addEventListener("scroll", () => { const sticky = document.getElementById("stickyNav"); if (window.scrollY > 70) sticky.classList.add("show"); else sticky.classList.remove("show"); });
  function setupNav() {
    const links = [
      { class: ".nav-tshirts", id: "tshirts-section" }, { class: ".nav-sweaters", id: "sweaters-section" }, { class: ".nav-hoodies", id: "hoodies-section" },
      { class: ".sticky-tshirts", id: "tshirts-section" }, { class: ".sticky-sweaters", id: "sweaters-section" }, { class: ".sticky-hoodies", id: "hoodies-section" }
    ];
    links.forEach(l => { document.querySelectorAll(l.class).forEach(el => { el.addEventListener("click", (e) => { e.preventDefault(); document.getElementById(l.id).scrollIntoView({ behavior: "smooth" }); }); }); });
  }
  document.getElementById("cartIcon")?.addEventListener("click", () => document.getElementById("cartSidebar").classList.add("open"));
  document.getElementById("stickyCartIcon")?.addEventListener("click", () => document.getElementById("cartSidebar").classList.add("open"));
  document.getElementById("closeCartBtn")?.addEventListener("click", () => document.getElementById("cartSidebar").classList.remove("open"));
  document.getElementById("checkoutBtn")?.addEventListener("click", () => { if (cart.length === 0) alert("Cart empty"); else { let total = cart.reduce((s,i) => s + (i.price * i.qty), 0); alert(`✅ Total: R${total.toFixed(2)}\nPayment coming soon.`); } });
  document.getElementById("modalConfirmBtn")?.addEventListener("click", confirmAdd);
  document.getElementById("modalCloseBtn")?.addEventListener("click", closeModal);
  window.addEventListener("click", (e) => { if (e.target === document.getElementById("sizeColorModal")) closeModal(); });

  renderGrid(tshirts, "tshirtsGrid");
  renderGrid(sweaters, "sweatersGrid");
  renderGrid(hoodies, "hoodiesGrid");
  setupNav();
  loadCart();
</script>
</body>
</html>
